<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 바인딩 활용</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        p {
            font-size: 30px;
        }
    </style>
</head>

<body>
    <xmp>
        아래 지시사항에 맞추어 데이터를 바인딩 해 보세요!
    </xmp>
    <hr>

    <div id="my">
        <div>
            콧수염 표현식 데이터 바인딩: <p></p>
        </div>
        <div>
            v-html 데이터 바인딩: <p> </p>
        </div>
        <div>
            v-text 데이터 바인딩: <p> </p>
        </div>
    </div>
</body>

</html>


<!-- vue 플러그인 임포트   -->
<script src="https://unpkg.com/vue@2.5.16/dist/vue.js"></script>
<script>
new Vue({
    /* edtmc^2w */
    el: "#my",
    data: {
        message: "<h1 style='color:green;'>첫번째 Vue.js 앱 입니다!</h1>",
    },
});
</script>
